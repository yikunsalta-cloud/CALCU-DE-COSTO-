<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de Costos</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

:root{
--amarillo:#FCCE90;
--rosa:#FD39A2;
--morado:#A43BCB;
--celeste:#84D4D8;
}

*{
box-sizing:border-box;
font-family:Segoe UI;
}

body{
margin:0;
background:linear-gradient(135deg,var(--rosa),var(--morado));
display:flex;
justify-content:center;
padding:20px;
}

.app{
background:white;
max-width:480px;
width:100%;
border-radius:20px;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.logo-container{
text-align:center;
margin-bottom:20px;
}

.logo{
width:170px;
}

.card{
background:white;
border-radius:15px;
padding:15px;
margin-bottom:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card-title{
color:var(--rosa);
font-weight:bold;
margin-bottom:10px;
}

input{
width:100%;
padding:8px;
margin-bottom:8px;
border-radius:8px;
border:1px solid #ddd;
}

.row{
display:flex;
gap:8px;
}

.row input{
flex:1;
}

.resumen{
background:var(--celeste);
padding:15px;
border-radius:15px;
}

.total{
font-size:20px;
font-weight:bold;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:8px;
font-weight:bold;
cursor:pointer;
}

.btn-pdf{
background:var(--rosa);
color:white;
}

.btn-print{
background:var(--morado);
color:white;
}

.fab{
position:fixed;
bottom:20px;
right:20px;
width:55px;
height:55px;
border-radius:50%;
background:var(--amarillo);
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="app">

<div class="logo-container">
<img src="logo.png" class="logo">
</div>

<div id="productos"></div>

<div class="card">
<div class="card-title">Mano de Obra</div>

<div class="row">
<input id="horas" type="number" placeholder="Horas">
<input id="pagoHora" type="number" placeholder="Pago x Hora">
</div>

</div>

<div class="card">
<div class="card-title">Margen %</div>

<input id="margen" type="number" value="50">

</div>

<div class="card">
<div class="card-title">Descuento %</div>

<input id="descuento" type="number" value="0">

</div>

<div class="resumen">

<div>
Costo Producción:
<span id="costoTotal">$0</span>
</div>

<div>
Precio Final:
<span class="total" id="precioFinal">$0</span>
</div>

</div>

<button class="btn-pdf" onclick="generarPDF()">
Generar PDF
</button>

<button class="btn-print" onclick="window.print()">
Imprimir
</button>

</div>

<div class="fab" onclick="agregarProducto()">+</div>

<script>

function formatoARS(n){

return "$ " + n.toLocaleString("es-AR");

}

function agregarProducto(){

let cont=document.getElementById("productos");

let card=document.createElement("div");

card.className="card";

card.innerHTML=`

<div class="card-title">
Material
</div>

<input placeholder="Nombre">

<div class="row">

<input class="cantidad" type="number" placeholder="Cantidad">

<input class="costo" type="number" placeholder="Costo">

</div>

`;

cont.appendChild(card);

}

function calcular(){

let totalMaterial=0;

let cantidades=document.querySelectorAll(".cantidad");

let costos=document.querySelectorAll(".costo");

for(let i=0;i<cantidades.length;i++){

let c=parseFloat(cantidades[i].value)||0;

let p=parseFloat(costos[i].value)||0;

totalMaterial+=c*p;

}

let horas=parseFloat(horasInput.value)||0;

let pago=parseFloat(pagoHora.value)||0;

let mo=horas*pago;

let costoProduccion=totalMaterial+mo;

let margen=parseFloat(margenInput.value)||0;

let precioMargen=costoProduccion+(costoProduccion*margen/100);

let descuento=parseFloat(descuentoInput.value)||0;

let precioFinal=precioMargen-(precioMargen*descuento/100);

costoTotal.innerText=formatoARS(costoProduccion);

precioFinalSpan.innerText=formatoARS(precioFinal);

}

document.addEventListener("input",calcular);

let horasInput=document.getElementById("horas");

let pagoHora=document.getElementById("pagoHora");

let margenInput=document.getElementById("margen");

let descuentoInput=document.getElementById("descuento");

let costoTotal=document.getElementById("costoTotal");

let precioFinalSpan=document.getElementById("precioFinal");

agregarProducto();

function generarPDF(){

const {jsPDF}=window.jspdf;

const doc=new jsPDF();

let hoy=new Date();

let vencimiento=new Date();

vencimiento.setDate(hoy.getDate()+5);

let fecha=hoy.toLocaleDateString("es-AR");

let valido=vencimiento.toLocaleDateString("es-AR");

let logo=new Image();

logo.src="logo.png";

logo.onload=function(){

doc.addImage(logo,"PNG",60,10,90,40);

doc.setFontSize(12);

doc.text("Fecha: "+fecha,20,55);

doc.setTextColor(200,0,0);

doc.text("Valido hasta: "+valido,130,55);

doc.setTextColor(0,0,0);

let y=70;

doc.setFontSize(14);

doc.text("Materiales",20,y);

y+=10;

let nombres=document.querySelectorAll(".card input[type='text'], .card input[placeholder='Nombre']");

let cantidades=document.querySelectorAll(".cantidad");

let costos=document.querySelectorAll(".costo");

let totalMaterial=0;

for(let i=0;i<cantidades.length;i++){

let nombre=nombres[i].value||"Material";

let cant=parseFloat(cantidades[i].value)||0;

let costo=parseFloat(costos[i].value)||0;

let subtotal=cant*costo;

totalMaterial+=subtotal;

doc.setFontSize(12);

doc.text(nombre,20,y);

doc.text("$"+subtotal.toLocaleString("es-AR"),170,y,{align:"right"});

y+=8;

}

let horas=parseFloat(horasInput.value)||0;

let pago=parseFloat(pagoHora.value)||0;

let mo=horas*pago;

let costoProduccion=totalMaterial+mo;

y+=10;

doc.text("Costo Produccion:",20,y);

doc.text("$"+costoProduccion.toLocaleString("es-AR"),170,y,{align:"right"});

let margen=parseFloat(margenInput.value)||0;

let precioMargen=costoProduccion+(costoProduccion*margen/100);

let descuento=parseFloat(descuentoInput.value)||0;

let precioFinal=precioMargen-(precioMargen*descuento/100);

if(descuento>0){

y+=10;

doc.text("Descuento "+descuento+"%",20,y);

doc.text("-$"+(precioMargen-precioFinal).toLocaleString("es-AR"),170,y,{align:"right"});

}

let sena=precioFinal*0.5;

y+=15;

doc.setFontSize(14);

doc.text("Seña 50%",20,y);

doc.text("$"+sena.toLocaleString("es-AR"),170,y,{align:"right"});

y+=20;

doc.setFontSize(22);

doc.setTextColor(200,0,0);

doc.text("TOTAL",105,y,{align:"center"});

y+=10;

doc.setFontSize(28);

doc.text("$ "+precioFinal.toLocaleString("es-AR"),105,y,{align:"center"});

doc.setFontSize(10);

doc.setTextColor(0,0,0);

doc.text(
"Este presupuesto es valido por 5 dias desde la fecha de emision",
105,
285,
{align:"center"}
);

doc.save("Presupuesto.pdf");

};

}

</script>

</body>
</html>
