<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora Yikun</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family: Arial;
margin:0;
background: linear-gradient(135deg,#FD39A2,#FCCE90);
}

.app{
max-width:900px;
margin:30px auto;
padding:25px;
background:white;
border-radius:25px;
box-shadow:0px 10px 30px rgba(0,0,0,0.2);
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
height:80px;
}

h2{
text-align:center;
color:#A43BCB;
margin-bottom:20px;
}

.tabla{
width:100%;
border-collapse:collapse;
margin-bottom:20px;
}

.tabla th{

background:#A43BCB;
color:white;
padding:12px;
}

.tabla td{

padding:10px;
border-bottom:1px solid #ddd;

}

input,select{

padding:8px;
border-radius:8px;
border:1px solid #ccc;
width:100%;

}

button{

border:none;
padding:14px;
border-radius:10px;
cursor:pointer;
font-size:16px;
margin-top:10px;

}

.agregar{

background:#84D4D8;
width:100%;

}

.pdf{

background:#FD39A2;
color:white;
width:100%;

}

.calcular{

background:#A43BCB;
color:white;
width:100%;

}

.resumen{

margin-top:20px;
padding:20px;
background:#FCCE90;
border-radius:15px;

}

.total{

font-size:28px;
color:red;
font-weight:bold;
text-align:center;

}

</style>
</head>

<body>

<div class="app">

<div class="logo">
<img src="logo.png">
</div>

<h2>Calculadora de Costos</h2>


<table class="tabla" id="tabla">

<tr>

<th>Producto</th>
<th>Cantidad</th>
<th>Costo</th>
<th>Subtotal</th>

</tr>

</table>

<button class="agregar" onclick="agregarFila()">
Agregar Articulo
</button>


<h3>Mano de Obra</h3>

<input id="valorHora" placeholder="Valor Hora">

<select id="tipoTiempo">
<option value="hora">Horas</option>
<option value="minuto">Minutos</option>
</select>

<input id="tiempo" placeholder="Tiempo">


<h3>Produccion</h3>

<input id="produccion" placeholder="Costo Produccion">


<h3>Descuento %</h3>

<input id="descuento" value="0">


<button class="calcular" onclick="calcular()">
Calcular
</button>


<div class="resumen">

Costo Producción:

<div id="costoProduccion">$0</div>

Seña 50%:

<div id="sena">$0</div>

<div class="total" id="totalFinal">
$0
</div>

</div>


<button class="pdf" onclick="generarPDF()">
Generar PDF
</button>

</div>



<script>

agregarFila()
agregarFila()


function agregarFila(){

let tabla=document.getElementById("tabla")

let fila=tabla.insertRow(-1)

fila.innerHTML=`

<td><input class="producto"></td>

<td><input class="cantidad" value="1"></td>

<td><input class="precio"></td>

<td class="subtotal">$0</td>

`

}



function calcular(){

let cantidades=document.querySelectorAll(".cantidad")
let precios=document.querySelectorAll(".precio")
let subtotales=document.querySelectorAll(".subtotal")

let totalMaterial=0


for(let i=0;i<cantidades.length;i++){

let c=parseFloat(cantidades[i].value)||0
let p=parseFloat(precios[i].value)||0

let s=c*p

subtotales[i].innerHTML="$"+s

totalMaterial+=s

}


let valorHora=parseFloat(valorHoraInput())||0
let tiempo=parseFloat(tiempoInput())||0

if(tipoTiempo.value=="minuto")
tiempo=tiempo/60

let manoObra=valorHora*tiempo


let produccion=parseFloat(produccionInput())||0

let subtotalGeneral=
totalMaterial+manoObra+produccion


let descuentoPor=parseFloat(descuentoInput())||0

let descuentoMonto=
subtotalGeneral*(descuentoPor/100)


let totalFinal=
subtotalGeneral-descuentoMonto


document.getElementById("costoProduccion").innerHTML="$"+subtotalGeneral

document.getElementById("sena").innerHTML="$"+(totalFinal/2).toFixed(0)

document.getElementById("totalFinal").innerHTML=
"$"+totalFinal.toFixed(0)


window.totalPDF=totalFinal
window.materialPDF=totalMaterial
window.manoPDF=manoObra
window.prodPDF=produccion
window.descPDF=descuentoMonto
window.descPorPDF=descuentoPor

}



function valorHoraInput(){
return document.getElementById("valorHora").value
}

function tiempoInput(){
return document.getElementById("tiempo").value
}

function produccionInput(){
return document.getElementById("produccion").value
}

function descuentoInput(){
return document.getElementById("descuento").value
}



function generarPDF(){

if(!window.totalPDF){
alert("Calcular primero")
return
}

const { jsPDF } = window.jspdf;

let pdf=new jsPDF()

let hoy=new Date()

let fecha=
hoy.getDate()+"/"+
(hoy.getMonth()+1)+"/"+
hoy.getFullYear()

let valido=new Date()

valido.setDate(hoy.getDate()+5)

let fechaValida=
valido.getDate()+"/"+
(valido.getMonth()+1)+"/"+
valido.getFullYear()


pdf.addImage("logo.png","PNG",70,5,70,30)


pdf.setFont("helvetica","bold")

pdf.text("Fecha: "+fecha,20,45)

pdf.setTextColor(255,0,0)

pdf.text("Valido hasta: "+fechaValida,20,55)


pdf.setTextColor(0,0,0)

pdf.text("DETALLADO",20,75)


let y=90


let productos=document.querySelectorAll(".producto")
let cantidades=document.querySelectorAll(".cantidad")
let precios=document.querySelectorAll(".precio")


for(let i=0;i<productos.length;i++){

let nombre=productos[i].value

if(nombre!=""){

let c=cantidades[i].value
let p=precios[i].value

let s=c*p

pdf.text(
nombre+" "+c+" x $"+p+" = $"+s,
20,
y)

y+=10

}

}


y+=20

pdf.text(
"Costo Produccion: $"+window.prodPDF,
120,
240)

pdf.text(
"Seña 50%: $"+(window.totalPDF/2).toFixed(0),
120,
250)

pdf.text(
"Descuento: $"+window.descPDF.toFixed(0),
120,
260)


pdf.setFontSize(30)

pdf.setTextColor(255,0,0)

pdf.text(
"TOTAL FINAL",
110,
280)

pdf.text(
"$"+window.totalPDF.toFixed(0),
110,
295)



pdf.setFontSize(10)

pdf.setTextColor(0,0,0)

pdf.text(
"Este presupuesto es valido 5 dias desde la fecha de emision",
20,
285
)


pdf.save("presupuesto.pdf")

}

</script>


</body>
</html>
