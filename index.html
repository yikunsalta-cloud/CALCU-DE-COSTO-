<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora Yikun</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family: Arial;
background:#f4f6f8;
margin:0;
}

.app{
max-width:650px;
margin:30px auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0px 5px 20px rgba(0,0,0,0.15);
}

.logo{
text-align:center;
margin-bottom:15px;
}

.logo img{
height:70px;
}

h2{
text-align:center;
margin-bottom:20px;
color:#1f3c88;
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
}

button{
width:100%;
padding:15px;
background:#1f3c88;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
margin-top:10px;
}

.total{
font-size:22px;
text-align:center;
margin-top:15px;
color:#d32f2f;
font-weight:bold;
}

</style>
</head>

<body>

<div class="app">

<div class="logo">
<img src="logo.png">
</div>

<h2>Calculadora de Presupuesto</h2>

<input id="producto" placeholder="Nombre del producto">

<input id="material" type="number" placeholder="Costo Material">

<input id="cantidad" type="number" placeholder="Cantidad">

<input id="costoHora" type="number" placeholder="Valor Hora">

<select id="tipoTiempo">
<option value="hora">Horas</option>
<option value="minuto">Minutos</option>
</select>

<input id="tiempo" type="number" placeholder="Tiempo Trabajo">

<input id="produccion" type="number" placeholder="Costo Producción">

<input id="descuento" type="number" value="0" placeholder="Descuento %">

<button onclick="calcular()">Calcular</button>

<div class="total" id="resultado">
Total: $0
</div>

<button onclick="generarPDF()">Generar PDF</button>

</div>


<script>

let datosPDF={}

function calcular(){

let material=parseFloat(materialInput("material"))
let cantidad=parseFloat(materialInput("cantidad"))
let costoHora=parseFloat(materialInput("costoHora"))
let tiempo=parseFloat(materialInput("tiempo"))
let produccion=parseFloat(materialInput("produccion"))
let descuento=parseFloat(materialInput("descuento"))

let tipo=document.getElementById("tipoTiempo").value

if(tipo=="minuto"){
tiempo=tiempo/60
}

let manoObra=costoHora*tiempo

let subtotal=(material*cantidad)+manoObra+produccion

let descuentoMonto=subtotal*(descuento/100)

let total=subtotal-descuentoMonto

document.getElementById("resultado").innerHTML=
"Total: $"+total.toFixed(0)

datosPDF={

producto:document.getElementById("producto").value,
material:material,
cantidad:cantidad,
manoObra:manoObra,
produccion:produccion,
descuento:descuentoMonto,
descuentoPorcentaje:descuento,
total:total

}

}

function materialInput(id){
return document.getElementById(id).value||0
}



function generarPDF(){

if(!datosPDF.total){
alert("Primero calcular")
return
}

const { jsPDF } = window.jspdf;

let pdf=new jsPDF()

let hoy=new Date()

let fecha=
hoy.getDate()+"/"+
(hoy.getMonth()+1)+"/"+
hoy.getFullYear()

let valido=new Date()

valido.setDate(hoy.getDate()+5)

let fechaValida=
valido.getDate()+"/"+
(valido.getMonth()+1)+"/"+
valido.getFullYear()


pdf.addImage("logo.png","PNG",70,5,70,25)


pdf.setFont("helvetica","bold")

pdf.setFontSize(12)
pdf.text("Fecha: "+fecha,15,40)

pdf.setTextColor(200,0,0)
pdf.text("Valido hasta: "+fechaValida,15,48)


pdf.setTextColor(0,0,0)

pdf.setFont("helvetica","bold")
pdf.setFontSize(14)

pdf.text("DETALLADO",15,65)


pdf.setFontSize(12)

pdf.text("Producto: "+datosPDF.producto,15,75)

pdf.text("Material: $"+datosPDF.material,15,85)

pdf.text("Cantidad: "+datosPDF.cantidad,15,95)

pdf.text("Mano de obra: $"+datosPDF.manoObra.toFixed(0),15,105)



pdf.setFontSize(14)

pdf.text("Costo Produccion: $"+datosPDF.produccion,130,230)

pdf.text("Seña 50%: $"+(datosPDF.total/2).toFixed(0),130,240)


pdf.setFontSize(28)

pdf.setTextColor(220,0,0)

pdf.text("Total Final",130,260)

pdf.text("$"+datosPDF.total.toFixed(0),130,275)



pdf.setFontSize(10)

pdf.setTextColor(0,0,0)

pdf.text(
"Este presupuesto es valido 5 dias desde la fecha de emision",
15,
285
)


pdf.save("presupuesto.pdf")

}


</script>

</body>
</html>
