<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

:root{
--amarillo:#FCCE90;
--rosa:#FD39A2;
--morado:#A43BCB;
--celeste:#84D4D8;
}

*{
box-sizing:border-box;
font-family: 'Segoe UI', sans-serif;
}

body{
margin:0;
background:linear-gradient(135deg,var(--rosa),var(--morado));
min-height:100vh;
display:flex;
justify-content:center;
padding:20px;
}

.app{
background:white;
width:100%;
max-width:480px;
border-radius:20px;
padding:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
animation:fadeIn 0.5s ease-in-out;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

h1{
text-align:center;
color:var(--morado);
margin-bottom:20px;
}

.card{
background:#fff;
border-radius:15px;
padding:15px;
margin-bottom:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card-title{
font-weight:bold;
color:var(--rosa);
margin-bottom:10px;
}

input{
width:100%;
padding:8px;
margin-bottom:8px;
border-radius:8px;
border:1px solid #ddd;
}

.row{
display:flex;
gap:8px;
}

.row input{
flex:1;
}

.resumen{
background:var(--celeste);
padding:15px;
border-radius:15px;
color:#000;
}

.resumen div{
display:flex;
justify-content:space-between;
margin-bottom:6px;
}

.total{
font-weight:bold;
font-size:18px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
margin-top:8px;
}

.btn-add{
background:var(--amarillo);
}

.btn-pdf{
background:var(--rosa);
color:white;
}

.btn-print{
background:var(--morado);
color:white;
}

.fab{
position:fixed;
bottom:20px;
right:20px;
background:var(--rosa);
color:white;
width:55px;
height:55px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
cursor:pointer;
}

</style>
</head>

<body>

<div class="app">

<h1>Calculadora Pro</h1>

<div id="productos"></div>

<div class="card">
<div class="card-title">Mano de Obra</div>
<div class="row">
<input type="number" id="horas" placeholder="Horas">
<input type="number" id="pagoHora" placeholder="Pago x Hora">
</div>
</div>

<div class="card">
<div class="card-title">Margen</div>
<input type="number" id="margen" value="50" placeholder="Margen %">
</div>

<div class="resumen">
<div><span>Costo Producción:</span><span id="costoTotal">$0.00</span></div>
<div><span>Precio Venta:</span><span class="total" id="precioVenta">$0.00</span></div>
</div>

<button class="btn-pdf" onclick="generarPDF()">Generar PDF</button>
<button class="btn-print" onclick="window.print()">Imprimir</button>

</div>

<div class="fab" onclick="agregarProducto()">+</div>

<script>

function agregarProducto(){
const contenedor = document.getElementById("productos");

const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<div class="card-title">Producto</div>
<input type="text" placeholder="Nombre">
<div class="row">
<input type="number" class="cantidad" placeholder="Cantidad">
<input type="number" class="costo" placeholder="Costo Unitario">
</div>
`;

contenedor.appendChild(card);
}

function calcular(){

let totalMateriales = 0;

let cantidades = document.querySelectorAll(".cantidad");
let costos = document.querySelectorAll(".costo");

for(let i=0;i<cantidades.length;i++){
let cantidad = parseFloat(cantidades[i].value) || 0;
let costo = parseFloat(costos[i].value) || 0;
totalMateriales += cantidad * costo;
}

let horas = parseFloat(document.getElementById("horas").value) || 0;
let pagoHora = parseFloat(document.getElementById("pagoHora").value) || 0;

let totalMO = horas * pagoHora;

let costoProduccion = totalMateriales + totalMO;

document.getElementById("costoTotal").innerText = "$" + costoProduccion.toFixed(2);

let margen = parseFloat(document.getElementById("margen").value) || 0;
let precioFinal = costoProduccion + (costoProduccion * margen / 100);

document.getElementById("precioVenta").innerText = "$" + precioFinal.toFixed(2);
}

document.addEventListener("input", calcular);

agregarProducto();

function generarPDF(){

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

doc.setFontSize(18);
doc.text("Resumen de Costos",20,20);

let y=35;

let nombres = document.querySelectorAll(".card input[type='text']");
let cantidades = document.querySelectorAll(".cantidad");
let costos = document.querySelectorAll(".costo");

for(let i=0;i<cantidades.length;i++){
let nombre = nombres[i].value || "Producto";
let cantidad = parseFloat(cantidades[i].value) || 0;
let costo = parseFloat(costos[i].value) || 0;
let subtotal = cantidad * costo;

doc.setFontSize(12);
doc.text(`${nombre} - ${cantidad} x $${costo} = $${subtotal.toFixed(2)}`,20,y);
y+=8;
}

y+=10;

doc.text("Costo Producción: " + document.getElementById("costoTotal").innerText,20,y);
y+=8;
doc.text("Precio Venta: " + document.getElementById("precioVenta").innerText,20,y);

doc.save("cotizacion.pdf");
}

</script>

</body>
    </html>
