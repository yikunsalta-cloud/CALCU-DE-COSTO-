<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de Costos</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

:root{
--amarillo:#FCCE90;
--rosa:#FD39A2;
--morado:#A43BCB;
--celeste:#84D4D8;
}

body{
margin:0;
background:linear-gradient(135deg,var(--rosa),var(--morado));
font-family:Segoe UI;
display:flex;
justify-content:center;
padding:20px;
}

.app{
background:white;
max-width:480px;
width:100%;
border-radius:20px;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.logo{
width:170px;
display:block;
margin:auto;
margin-bottom:15px;
}

.card{
background:white;
border-radius:15px;
padding:15px;
margin-bottom:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card-title{
color:var(--rosa);
font-weight:bold;
margin-bottom:10px;
}

input,select{
width:100%;
padding:8px;
margin-bottom:8px;
border-radius:8px;
border:1px solid #ddd;
}

.row{
display:flex;
gap:8px;
}

.resumen{
background:var(--celeste);
padding:15px;
border-radius:15px;
}

.total{
font-size:22px;
font-weight:bold;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:8px;
font-weight:bold;
cursor:pointer;
}

.btn-pdf{
background:var(--rosa);
color:white;
}

.fab{
position:fixed;
bottom:20px;
right:20px;
width:55px;
height:55px;
border-radius:50%;
background:var(--amarillo);
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="app">

<img src="logo.png" class="logo">

<div id="productos"></div>

<div class="card">
<div class="card-title">Mano de Obra</div>

<select id="tipoTiempo">
<option value="horas">Horas</option>
<option value="minutos">Minutos</option>
</select>

<input id="tiempo" type="number" placeholder="Cantidad">
<input id="valorHora" type="number" placeholder="Valor por Hora">

</div>

<div class="card">
<div class="card-title">Margen %</div>
<input id="margen" value="50" type="number">
</div>

<div class="card">
<div class="card-title">Descuento %</div>
<input id="descuento" value="0" type="number">
</div>

<div class="resumen">

Costo Producción:
<span id="costoTotal">$0</span>

<br><br>

Precio Final:
<span id="precioFinal" class="total">$0</span>

</div>

<button class="btn-pdf" onclick="generarPDF()">
Generar PDF
</button>

</div>

<div class="fab" onclick="agregarProducto()">+</div>

<script>

function formato(n){
return "$ "+n.toLocaleString("es-AR");
}

function agregarProducto(){

let cont=document.getElementById("productos");

let card=document.createElement("div");

card.className="card";

card.innerHTML=`

<div class="card-title">Material</div>

<input class="nombre" placeholder="Nombre">

<div class="row">

<input class="cantidad" type="number" placeholder="Cantidad">

<input class="costo" type="number" placeholder="Costo">

</div>

`;

cont.appendChild(card);

}


function calcular(){

let totalMaterial=0;

let cantidades=document.querySelectorAll(".cantidad");
let costos=document.querySelectorAll(".costo");

for(let i=0;i<cantidades.length;i++){

let c=parseFloat(cantidades[i].value)||0;
let p=parseFloat(costos[i].value)||0;

totalMaterial+=c*p;

}

let tiempo=parseFloat(document.getElementById("tiempo").value)||0;
let valorHora=parseFloat(document.getElementById("valorHora").value)||0;
let tipo=document.getElementById("tipoTiempo").value;

let horas=(tipo=="minutos")? tiempo/60 : tiempo;

let manoObra=horas*valorHora;

let costoProduccion=totalMaterial+manoObra;

let margenValor=parseFloat(document.getElementById("margen").value)||0;

let precioMargen=costoProduccion+(costoProduccion*margenValor/100);

let descuentoValor=parseFloat(document.getElementById("descuento").value)||0;

let precioFinalCalc=precioMargen-(precioMargen*descuentoValor/100);

document.getElementById("costoTotal").innerText=formato(costoProduccion);
document.getElementById("precioFinal").innerText=formato(precioFinalCalc);

}

document.addEventListener("input",calcular);

agregarProducto();


function generarPDF(){

const {jsPDF}=window.jspdf;

let doc=new jsPDF();

let hoy=new Date();
let vencimiento=new Date();

vencimiento.setDate(hoy.getDate()+5);

let fecha=hoy.toLocaleDateString("es-AR");
let valido=vencimiento.toLocaleDateString("es-AR");

let logo=new Image();
logo.src="logo.png";

logo.onload=function(){

doc.setFont("helvetica","bold");

doc.addImage(logo,"PNG",65,10,80,35);


doc.setFontSize(12);
doc.setTextColor(0,0,0);

doc.text("Fecha: "+fecha,20,55);

doc.setTextColor(200,0,0);
doc.text("Valido hasta: "+valido,20,63);

doc.setTextColor(0,0,0);


doc.setFontSize(16);
doc.text("DETALLADO",20,80);

doc.line(20,85,190,85);


doc.setFontSize(12);

doc.text("Producto",20,92);
doc.text("Cant",120,92);
doc.text("Costo",150,92);
doc.text("Subtotal",190,92,{align:"right"});

doc.line(20,95,190,95);


let y=105;

let nombres=document.querySelectorAll(".nombre");
let cantidades=document.querySelectorAll(".cantidad");
let costos=document.querySelectorAll(".costo");

let totalMaterial=0;

for(let i=0;i<cantidades.length;i++){

let nombre=nombres[i].value||"Material";
let cant=parseFloat(cantidades[i].value)||0;
let costo=parseFloat(costos[i].value)||0;

let subtotal=cant*costo;

if(subtotal>0){

totalMaterial+=subtotal;

doc.text(nombre,20,y);

doc.text(String(cant),125,y);

doc.text("$"+costo.toLocaleString("es-AR"),150,y);

doc.text(
"$"+subtotal.toLocaleString("es-AR"),
190,
y,
{align:"right"}
);

y+=8;

}

}


let tiempo=parseFloat(document.getElementById("tiempo").value)||0;
let valorHora=parseFloat(document.getElementById("valorHora").value)||0;
let tipo=document.getElementById("tipoTiempo").value;

let horas=(tipo=="minutos")? tiempo/60 : tiempo;

let manoObra=horas*valorHora;

let costoProduccion=totalMaterial+manoObra;


let margenValor=parseFloat(document.getElementById("margen").value)||0;

let precioMargen=costoProduccion+(costoProduccion*margenValor/100);


let descuentoValor=parseFloat(document.getElementById("descuento").value)||0;

let montoDescuento=precioMargen*(descuentoValor/100);

let precioFinalCalc=precioMargen-montoDescuento;

let sena=precioFinalCalc*0.5;


doc.line(100,235,190,235);


doc.setFontSize(12);

doc.text("Costo Produccion:",120,245);

doc.text(
"$"+costoProduccion.toLocaleString("es-AR"),
190,
245,
{align:"right"}
);


if(descuentoValor>0){

doc.text("Descuento "+descuentoValor+"%:",120,255);

doc.text(
"-$"+montoDescuento.toLocaleString("es-AR"),
190,
255,
{align:"right"}
);

}


doc.text("Seña 50%:",120,265);

doc.text(
"$"+sena.toLocaleString("es-AR"),
190,
265,
{align:"right"}
);


doc.setFontSize(18);
doc.setTextColor(200,0,0);

doc.text(
"TOTAL DEL PEDIDO",
190,
280,
{align:"right"}
);

doc.setFontSize(32);

doc.text(
"$ "+precioFinalCalc.toLocaleString("es-AR"),
190,
295,
{align:"right"}
);


doc.setFontSize(10);

doc.setTextColor(0,0,0);

doc.text(
"Este presupuesto es valido 5 dias desde la fecha de emision",
105,
305,
{align:"center"}
);


doc.save("Presupuesto.pdf");

};

}

</script>

</body>
  </html>
